steps:
  - id: mint-github-token
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm install --prefix /workspace --silent @octokit/auth-app@7
        NODE_PATH=/workspace/node_modules node scripts/mint-github-token.mjs /workspace/gh_token.txt
    env:
      - APP_ID=${_APP_ID}
      - INSTALLATION_ID=${_INSTALLATION_ID}
    secretEnv:
      - APP_PRIVATE_KEY

  - id: release-please
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TOKEN=$(cat /workspace/gh_token.txt)

        npx -y release-please release-pr \
          --token="$$TOKEN" \
          --repo-url=afrikpay/afrikpay-com-rn-step-form \
          --config-file=release-please-config.json \
          --manifest-file=.release-please-manifest.json

        npx -y release-please github-release \
          --token="$$TOKEN" \
          --repo-url=afrikpay/afrikpay-com-rn-step-form \
          --config-file=release-please-config.json \
          --manifest-file=.release-please-manifest.json

substitutions:
  _APP_ID: '3467327'
  _INSTALLATION_ID: '126175433'

availableSecrets:
  secretManager:
    - versionName: projects/prod-app-base-060623/secrets/afrikpay-release-please-private-key/versions/latest
      env: APP_PRIVATE_KEY

options:
  logging: CLOUD_LOGGING_ONLY

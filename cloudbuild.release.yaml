steps:
  - id: mint-github-token
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p /workspace/node_modules
        npm install --prefix /workspace --silent @octokit/auth-app@7
        cat > /workspace/mint-token.mjs <<'EOF'
        import { createAppAuth } from '@octokit/auth-app';
        import { writeFileSync } from 'fs';

        const auth = createAppAuth({
          appId: process.env.APP_ID,
          privateKey: process.env.APP_PRIVATE_KEY,
          installationId: process.env.INSTALLATION_ID,
        });
        const { token } = await auth({ type: 'installation' });
        writeFileSync('/workspace/gh_token.txt', token, { mode: 0o600 });
        console.log('Token minted (expires in 1h)');
        EOF
        node /workspace/mint-token.mjs
    env:
      - APP_ID=${_APP_ID}
      - INSTALLATION_ID=${_INSTALLATION_ID}
    secretEnv:
      - APP_PRIVATE_KEY

  - id: release-please
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TOKEN=$(cat /workspace/gh_token.txt)

        npx -y release-please release-pr \
          --token="$$TOKEN" \
          --repo-url=afrikpay/afrikpay-com-rn-step-form \
          --config-file=release-please-config.json \
          --manifest-file=.release-please-manifest.json

        npx -y release-please github-release \
          --token="$$TOKEN" \
          --repo-url=afrikpay/afrikpay-com-rn-step-form \
          --config-file=release-please-config.json \
          --manifest-file=.release-please-manifest.json

substitutions:
  _APP_ID: '3467327'
  _INSTALLATION_ID: '126175433'

availableSecrets:
  secretManager:
    - versionName: projects/prod-app-base-060623/secrets/afrikpay-release-please-private-key/versions/latest
      env: APP_PRIVATE_KEY

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install-build
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        corepack enable
        corepack prepare yarn@3.6.1 --activate
        yarn install --immutable
        yarn prepare

  - id: publish
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euxo pipefail
        cp .npmrc /builder/home/.npmrc
        npx -y google-artifactregistry-auth
        PKG_VERSION=$(node -p "require('./package.json').version")
        echo "Publishing @afrikpay/rn-step-form@$$PKG_VERSION"
        npm publish --userconfig=/builder/home/.npmrc

options:
  logging: CLOUD_LOGGING_ONLY
